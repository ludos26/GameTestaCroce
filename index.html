<!DOCTYPE html>
<head>
    <style>
    
        img {
            transform: rotate(0deg); 
        }
	
        .content {
            height: 180px;
            display: flex;
            width: 350px;
            align-items: center;
            justify-content: center;
            background-color: white;
        }
        
        #div-center {
            display: block;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(255, 255, 255);
      
        }

        button {
            width: 200px;
            height: 40px;
        }

        p {
            color: black;
        }

        h1 {
            text-align: center;
        }

        h2 {
            text-align: center;
        }

        label {
            font-size: 20px;
        }
        input {
            height: 30px;
            width: 250px;
            text-align: center;
        }
        
        #btnLoad {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background-image: radial-gradient(yellow, green);
            color: rgb(0, 0, 0);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 16px;
            border: 3px solid rgb(88, 20, 20);
	    }

        #btnLoad:hover {
            background-image: radial-gradient(yellow 20%, green 80%);
            color: rgb(0, 0, 0);
        }

        #subtext {
            font-weight: bold;
        }
      
    </style>
</head>

<body>

    <h1>Gioca a Testa e Croce</h1>
    <h2>per 3 partite</h2>
	
    <header> 
        <div id="div-center">
            <h3>Scegli Testa o Croce</h3>
             <p id="text"></p>
             <p id="subtext"></p>
            <div class="content">
                <img src="moneta.jpg" alt="Testa">
                <input id="radio1" name="radios" type="radio" value="1" checked/><br>
                <img src="moneta0.jpg" alt="Croce" >
                <input id="radio2" name="radios" type="radio" value="0"/><br>
            </div><br>
            <div class="content">
                <button id="btnLoad" type="button">Lancia<br>la<br>Moneta</button><br>
                
            </div>
            <div class="content">
                <img id="moneta" src="moneta.jpg" alt="money"/>
            </div>
        </div>
    </header>


   
    
<script>

    let radioSelected = document.querySelector('input[name="radios"]:checked');

    let num = radioSelected.value; 

    let text = document.getElementById("text"); 

    let subtext = document.getElementById("subtext"); 

    let imgMoney = document.getElementById("moneta"); 

    let i = 1;
    let inc = 3;

    let btn = document.getElementById("btnLoad"); 

    let val = "";

    let rnd = 0;

    let myScore = 0;
    let pcScore = 0;

    let partite = 3;
    
    let back = false;
    
    let ang = 90;
    
    let k = 0;

    function loadGame() {        

        rnd = Math.floor(Math.random()*2);

        radioSelected = document.querySelector('input[name="radios"]:checked');

        num = radioSelected.value;
        
        imgMoney.src = "moneta.jpg";
        
        k=0;
        
        back = false;

        if (rnd==num){ 
            
           val = "Hai indovinato, " + ( (rnd == 1) ? "Testa" : "Croce" )

           text.style.color = "green";

           myScore++;
            
        }
        else if(rnd<num || rnd>num){
            
           val = "Hai sbagliato, era " + ( (rnd == 1) ? "Testa" : "Croce" )

           text.style.color = "red";

           pcScore++;

        } 

        partite--;


    }
    
 

    btn.onclick = function(){
    
    	text.innerText = "";
        
	//setInterval(rotate, 10);

        loadGame();

        lancia();

        const id = setInterval(() => {
            
            rotate();
            
            
            
            if(rnd==num && num==1) {
       
                if (i % 360 == 0) {
                    inc--;            
                }

            }
            else if(rnd!=num && num==1)
            {    
                if (i % 180 == 0) {
                    inc--;            
                }
            }
            else if(rnd==num && num==0) {
       
                if (i % 180 == 0) {
                    inc--;            
                }

            }
            else if(rnd!=num && num==0)
            {    
                if (i % 360 == 0) {
                    inc--;            
                }
            }
            
            

            if (inc === 0) {
            
                clearInterval(id);
                  
                inc = 3;
                
                i = 1;
                
                if (partite == 0) {

                    text.innerText = val;

                    if(myScore>pcScore)

                        subtext.innerText = "Vinto! Tu " + myScore + " Vs PC " + pcScore;

                    else if(myScore<pcScore)

                        subtext.innerText = "Perso! Tu " + myScore + " Vs PC " + pcScore;
                

                    partite = 3
                    
                    myScore = 0;
                    pcScore = 0;

                } else

                    text.innerText = val;
            }

        }, 10);


    };

    function lancia(){

        imgMoney.style = "transform: rotate("+0+"deg);";
        
        i=0;

    }

    function rotate() {

        i+=inc;
       
        if ( i % (90+180*k) == 0 ){
        
        	if (!back) {
        		imgMoney.src = "moneta0.jpg";
        		back = true;
        	
        	} 
        	else {
        		imgMoney.src = "moneta.jpg";
        		back = false;
        	}
        	
  		k++;
        	 
        }
        
        imgMoney.style = "transform: rotateX("+i+"deg);";

    }




</script>
</body>
