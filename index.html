<!DOCTYPE html>
<head>
    <style>
    
        img {
            transform: rotate(0deg); 
        }
	
        #content {
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        #div-center {
            background-color: white;
        }

        header {
            display: block;
            text-align: center;
        }

        button {
            width: 200px;
            height: 40px;
        }

        p {
            color: black;
        }

        h1 {
            text-align: center;
        }

        label {
            font-size: 20px;
        }
        input {
            height: 30px;
            width: 250px;
            text-align: center;
        }
      
    </style>
</head>

<body>

    <h1> Gioca a Testa e Croce (5 partite) </h1>
	
    <header>
        <label>Scegli testa o croce</label><br><br>
        <div style="display: inline;">
            <img src="moneta.jpg" alt="Testa">
            <input id="radio1" name="radios" type="radio" value="1" checked/><br>
            <img src="moneta0.jpg" alt="Croce" >
            <input id="radio2" name="radios" type="radio" value="0"/><br><br>
        </div> 
        <button id="btnLoad" type="button">Lancia moneta</button><br>
         <p id="text"></p>
    </header>

    <div id="content">
        <div id="div-center">
            <img id="moneta" src="moneta.jpg" alt="money"/>
        </div>
    </div>

   
    
<script>

    let radioSelected = document.querySelector('input[name="radios"]:checked');

    let num = radioSelected.value; //Number(document.getElementById("num").value); 
    let text = document.getElementById("text"); 

    let imgMoney = document.getElementById("moneta"); 

    let i = 1;
    let j = 1;
    let inc = 3;

    let btn = document.getElementById("btnLoad"); 

    let val = "";

    let rnd = 0;

    let myScore = 0;
    let pcScore = 0;

    let partite = 5;
    
    let back = false;
    
    let ang = 90;
    
    let k = 0;

    function loadGame() {        

        rnd = Math.floor(Math.random()*2);

        radioSelected = document.querySelector('input[name="radios"]:checked');

        num = radioSelected.value;

        //num = Number(document.getElementById("num").value); 
        
        imgMoney.src = "moneta.jpg";
        
        k=0;
        
        back = false;

        if (rnd==num){ 
            
           val = "Hai indovinato, " + ( (rnd == 1) ? "Testa" : "Croce" )

           myScore++;
            
        }
        else if(rnd<num || rnd>num){
            
           val = "Hai sbagliato, era " + ( (rnd == 1) ? "Testa" : "Croce" )

           pcScore++;

        } 

        partite--;


    }
    
 

    btn.onclick = function(){
    
    	text.innerText = "";
        
	//setInterval(rotate, 10);

        loadGame();

        lancia();

        const id = setInterval(() => {
            
            rotate();
            
            
            
            if(rnd==num && num==1) {
       
                if (i % 360 == 0) {
                    inc--;            
                }

            }
            else if(rnd!=num && num==1)
            {    
                if (i % 180 == 0) {
                    inc--;            
                }
            }
            else if(rnd==num && num==0) {
       
                if (i % 180 == 0) {
                    inc--;            
                }

            }
            else if(rnd!=num && num==0)
            {    
                if (i % 360 == 0) {
                    inc--;            
                }
            }
            
            

            if (inc === 0) {
            
                clearInterval(id);
                  
                inc = 3;
                
                i = 1;
                
                if (partite == 0) {

                    if(myScore>pcScore)

                        text.innerHTML = val + "<br><br>Hai vinto con punteggio: " + myScore + " contro il pc, con punteggio: " + pcScore;

                    else if(myScore<pcScore)

                        text.innerHTML = val + "<br><br>Hai perso con punteggio: " + myScore + " contro il pc, con punteggio: " + pcScore;
                

                    partite = 5
                    
                    myScore = 0;
                    pcScore = 0;

                } else

                    text.innerText = val;
            }

        }, 10);


    };

    function lancia(){

        imgMoney.style = "transform: rotate("+0+"deg);";
        
        i=0;

    }

    function rotate() {

        i+=inc;

        //j+=1;
       
        if ( i % (90+180*k) == 0 ){
        
        	if (!back) {
        		imgMoney.src = "moneta0.jpg";
        		back = true;
        	
        	} 
        	else {
        		imgMoney.src = "moneta.jpg";
        		back = false;
        	}
        	
  		k++;
        	 
        }
        
        //text.innerText = "Angolo" + i +";" + k;
       
        
        imgMoney.style = "transform: rotateX("+i+"deg);";

    }




</script>
</body>
