<!DOCTYPE html>
<head>
    <style>
    
        img {
            transform: rotate(0deg); 
        }
	
        #content {
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        #div-center {
            background-color: white;
        }

        header {
            display: block;
            text-align: center;
        }

        button {
            width: 200px;
            height: 40px;
        }

        p {
            color: black;
        }

        h1 {
            text-align: center;
        }

        label {
            font-size: 20px;
        }
        input {
            height: 30px;
            width: 250px;
            text-align: center;
        }
      
    </style>
</head>

<body>

    <h1> Gioca a Testa e Croce (5 partite) </h1>
	
    <header>
        <label>Inserisci 0 per croce o 1 per testa:</label><br>
        <input id="num" type="text" value="1"/><br><br>
         <button id="btnLoad" type="button">Lancia moneta</button><br>
         <p id="text"></p>
    </header>

    <div id="content">
        <div id="div-center">
            <img id="moneta" src="moneta.png" alt="money"/>
        </div>
    </div>

   
    
<script>

    let num = Number(document.getElementById("num").value); 
    let text = document.getElementById("text"); 

    let imgMoney = document.getElementById("moneta"); 

    let i=1;
    let inc=5;

    let btn = document.getElementById("btnLoad"); 

    let val = "";

    let rnd = 0;

    let myScore = 0;
    let pcScore = 0;

    let partite = 5;

    function loadGame() {        

        rnd = Math.floor(Math.random()*2);

        num = Number(document.getElementById("num").value); 

        if (rnd==num){ 
            
           val = "Hai indovinato, " + rnd;

           myScore++;
            
        }
        else if(rnd<num || rnd>num){
            
           val = "Hai sbagliato, era " + rnd;

           pcScore++;

        } 

        partite--;


    }
    
 

    btn.onclick = function(){
    
    	text.innerText = "";
        
	//setInterval(rotate, 10);

        loadGame();

        lancia();

        const id = setInterval(() => {
            
            rotate();
            
            if(rnd==num && num==1) {
       
                if (i % 360 == 0) {
                    inc--;            
                }

            }
            else if(rnd!=num && num==1)
            {    
                if (i % 180 == 0) {
                    inc--;            
                }
            }
            else if(rnd==num && num==0) {
       
                if (i % 180 == 0) {
                    inc--;            
                }

            }
            else if(rnd!=num && num==0)
            {    
                if (i % 360 == 0) {
                    inc--;            
                }
            }

            if (inc === 0) {
                clearInterval(id);  
                inc = 5;
                i = 1;
                if (partite == 0) {

                    if(myScore>pcScore)

                        text.innerHTML = val + "<br><br>Hai vinto con punteggio: " + myScore + " contro il pc, con punteggio: " + pcScore;

                    else if(myScore<pcScore)

                        text.innerHTML = val + "<br><br>Hai perso con punteggio: " + myScore + " contro il pc, con punteggio: " + pcScore;
                

                    partite = 5
                    
                    myScore = 0;
                    pcScore = 0;

                } else

                    text.innerText = val;
            }

        }, 10);


    };

    function lancia(){

        imgMoney.style = "transform: rotate("+0+"deg);";
        i=0;

    }

	function rotate() {

        i+=inc;

        if(i==360) i=0;
        
        imgMoney.style = "transform: rotate("+i+"deg);";

	}




</script>
</body>
